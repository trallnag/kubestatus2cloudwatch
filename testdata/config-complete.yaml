dryRun: false
seconds: 5

logging:
  level: debug
  format: logfmt

metric:
  namespace: MyNamespace
  name: MyMetric
  dimensions:
    - name: Cluster
      value: MyCluster

targets:
  - kind: StatefulSet
    namespace: observability
    name: prometheus
    mode: AllOfThem
  - kind: Deployment
    namespace: default
    name: socat-tunnel
    mode: AtLeastOne
  - kind: DaemonSet
    namespace: default
    name: debug-long-queries
    mode: AllOfThem
